<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="Ganna.LK new season collection">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f6f6"/>
      <stop offset="1" stop-color="#e9e9e9"/>
    </linearGradient>
    <linearGradient id="bag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3e3e3"/>
      <stop offset="1" stop-color="#cfcfcf"/>
    </linearGradient>
  </defs>

  <!-- neutral backdrop -->
  <rect width="640" height="480" fill="url(#bg)"/>

  <!-- soft neutral decorative circles -->
  <circle cx="120" cy="90" r="70" fill="#000000" opacity="0.04"/>
  <circle cx="560" cy="410" r="110" fill="#000000" opacity="0.04"/>
  <circle cx="540" cy="120" r="26" fill="#000000" opacity="0.05"/>

  <!-- single small brand accent -->
  <circle cx="92" cy="382" r="13" fill="#f87942"/>

  <!-- shopping bag (neutral) -->
  <g transform="translate(230 140)">
    <rect x="0" y="60" width="180" height="200" rx="20" fill="url(#bag)"/>
    <rect x="0" y="60" width="180" height="26" rx="12" fill="#ffffff" opacity="0.45"/>
    <!-- handle: the one brand pop -->
    <path d="M50 70 V44 a40 40 0 0 1 80 0 V70" fill="none" stroke="#f87942" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
