<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" role="img" aria-label="Ganna.LK featured banner">
  <defs>
    <linearGradient id="b3bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b2b33"/>
      <stop offset="1" stop-color="#16161a"/>
    </linearGradient>
    <radialGradient id="b3glow" cx="0.25" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#f87942" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#f87942" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="600" fill="url(#b3bg)"/>
  <rect width="1600" height="600" fill="url(#b3glow)"/>

  <!-- concentric brand rings -->
  <g fill="none" stroke="#f87942" opacity="0.5">
    <circle cx="1200" cy="300" r="120" stroke-width="3"/>
    <circle cx="1200" cy="300" r="185" stroke-width="2" opacity="0.6"/>
    <circle cx="1200" cy="300" r="255" stroke-width="1.5" opacity="0.35"/>
  </g>
  <circle cx="1200" cy="300" r="70" fill="#f87942"/>

  <!-- soft light circles -->
  <circle cx="300" cy="150" r="130" fill="#ffffff" opacity="0.05"/>
  <circle cx="220" cy="470" r="70" fill="#ffffff" opacity="0.06"/>

  <!-- scattered accent dots -->
  <circle cx="520" cy="240" r="10" fill="#f87942"/>
  <circle cx="600" cy="360" r="6" fill="#ffffff" opacity="0.5"/>
  <circle cx="470" cy="400" r="7" fill="#ffffff" opacity="0.35"/>
  <circle cx="900" cy="180" r="8" fill="#f87942" opacity="0.8"/>
</svg>
