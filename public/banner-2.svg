<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" role="img" aria-label="Ganna.LK new arrivals banner">
  <defs>
    <linearGradient id="b2bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf7f4"/>
      <stop offset="1" stop-color="#ece6df"/>
    </linearGradient>
    <linearGradient id="b2block" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f87942"/>
      <stop offset="1" stop-color="#e35c26"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="600" fill="url(#b2bg)"/>

  <!-- diagonal brand block -->
  <path d="M980 0 H1600 V600 H1200 Z" fill="url(#b2block)"/>
  <path d="M900 600 H1180 L1480 0 H1200 Z" fill="#000000" opacity="0.05"/>

  <!-- neutral decorative circles -->
  <circle cx="300" cy="180" r="150" fill="#000000" opacity="0.04"/>
  <circle cx="180" cy="470" r="90" fill="#000000" opacity="0.05"/>
  <circle cx="1330" cy="450" r="120" fill="#ffffff" opacity="0.18"/>

  <!-- hanger motif -->
  <g transform="translate(520 210)" stroke="#c9beb3" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M120 40 a26 26 0 1 1 26 26 v22"/>
    <path d="M146 88 L40 168 H252 Z"/>
  </g>

  <!-- brand accent dots on the block -->
  <circle cx="1360" cy="180" r="40" fill="#ffffff" opacity="0.22"/>
  <circle cx="1440" cy="270" r="18" fill="#ffffff" opacity="0.3"/>
  <circle cx="700" cy="440" r="14" fill="#f87942"/>
</svg>
