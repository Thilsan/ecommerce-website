<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 440" role="img" aria-label="Ganna.LK promotion banner">
  <defs>
    <linearGradient id="bpbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e35c26"/>
      <stop offset="0.5" stop-color="#f87942"/>
      <stop offset="1" stop-color="#ff9a5a"/>
    </linearGradient>
    <linearGradient id="bpcard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff1e8"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="440" fill="url(#bpbg)"/>

  <!-- diagonal light sweep -->
  <path d="M0 440 L520 0 H760 L240 440 Z" fill="#ffffff" opacity="0.08"/>
  <path d="M300 440 L820 0 H960 L440 440 Z" fill="#ffffff" opacity="0.06"/>

  <!-- decorative circles -->
  <circle cx="150" cy="90" r="70" fill="#ffffff" opacity="0.14"/>
  <circle cx="1470" cy="360" r="120" fill="#000000" opacity="0.06"/>
  <circle cx="1400" cy="90" r="26" fill="#ffffff" opacity="0.25"/>

  <!-- gift / card motif on the right -->
  <g transform="translate(1120 120)">
    <rect x="0" y="0" width="330" height="210" rx="26" fill="url(#bpcard)"/>
    <rect x="0" y="150" width="330" height="60" rx="0" fill="#f87942" opacity="0.12"/>
    <rect x="0" y="86" width="330" height="22" fill="#f87942" opacity="0.85"/>
    <rect x="150" y="0" width="26" height="210" fill="#f87942" opacity="0.85"/>
    <circle cx="163" cy="14" r="22" fill="none" stroke="#f87942" stroke-width="10"/>
  </g>

  <!-- accent dots -->
  <circle cx="640" cy="360" r="12" fill="#ffffff" opacity="0.6"/>
  <circle cx="700" cy="330" r="7" fill="#ffffff" opacity="0.4"/>
</svg>
